version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: pcc_db
    environment:
      POSTGRES_DB: pcc_incident_timer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: pcc_backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/pcc_incident_timer
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    container_name: pcc_frontend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
